version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uytamir
      POSTGRES_USER: ${POSTGRES_USER:-uytamir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uytamir} -d uytamir"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  api:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A celery_app worker -l info -Q default,media -c 4
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: ./backend
    command: celery -A celery_app beat -l info
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped

volumes:
  postgres_data:
