<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Main house -->
  <path d="M 10 42 L 32 10 L 54 42 L 54 58 L 10 58 Z" stroke="#1E40AF" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- Roof detail (horizontal line) -->
  <line x1="18" y1="28" x2="46" y2="28" stroke="#1E40AF" stroke-width="1.5" opacity="0.6"/>

  <!-- Door with frame -->
  <rect x="28" y="38" width="8" height="12" rx="1" stroke="#1E40AF" stroke-width="1.5" fill="none"/>
  <circle cx="35" cy="44" r="0.8" fill="#1E40AF"/>

  <!-- Vision/light element - rays at top -->
  <circle cx="32" cy="4" r="2" fill="#1E40AF" opacity="0.8"/>
  <line x1="32" y1="6.5" x2="32" y2="10" stroke="#1E40AF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Side rays -->
  <line x1="44" y1="10" x2="48" y2="4" stroke="#1E40AF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="20" y1="10" x2="16" y2="4" stroke="#1E40AF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Accent: window -->
  <rect x="16" y="32" width="6" height="6" rx="0.5" stroke="#1E40AF" stroke-width="1" fill="none" opacity="0.7"/>
  <rect x="42" y="32" width="6" height="6" rx="0.5" stroke="#1E40AF" stroke-width="1" fill="none" opacity="0.7"/>
</svg>