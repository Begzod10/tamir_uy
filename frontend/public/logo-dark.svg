<svg viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Icon (white strokes) -->
  <g>
    <!-- Main house -->
    <path d="M 20 50 L 40 20 L 60 50 L 60 65 L 20 65 Z" stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>

    <!-- Roof detail -->
    <line x1="32" y1="35" x2="48" y2="35" stroke="white" stroke-width="1.5" opacity="0.6"/>

    <!-- Door -->
    <rect x="38" y="45" width="8" height="12" rx="1" stroke="white" stroke-width="1.5" fill="none"/>

    <!-- Vision rays (stylized light/design) -->
    <circle cx="40" cy="10" r="2.5" fill="white" opacity="0.8"/>
    <line x1="40" y1="13" x2="40" y2="17" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="52" y1="14" x2="56" y2="10" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="28" y1="14" x2="24" y2="10" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Text: UyVision (white) -->
  <text x="75" y="55" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="white">UyVision</text>
</svg>