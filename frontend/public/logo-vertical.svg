    <line x1="40" y1="12" x2="40" y2="20" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="56" y1="16" x2="62" y2="8" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="24" y1="16" x2="18" y2="8" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Text: UyVision -->
